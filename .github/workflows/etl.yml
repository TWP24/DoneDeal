name: DoneDeal ETL

# Runs scrape + score + ingest in a single pass, every 2 hours.
# Also runnable manually from the GitHub Actions UI for testing.
on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

concurrency:
  # Prevent overlapping runs if a previous one is still going
  group: donedeal-etl
  cancel-in-progress: false

jobs:
  etl:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      INGEST_LISTINGS_URL: ${{ secrets.INGEST_LISTINGS_URL }}
      INGEST_OUTLIERS_URL: ${{ secrets.INGEST_OUTLIERS_URL }}
      INGEST_API_KEY: ${{ secrets.INGEST_API_KEY }}
      # Optional: restrict to specific makes. Comma separated.
      SCRAPE_MAKES: ${{ vars.SCRAPE_MAKES }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .                        # installs the `donedeal` package
          pip install -r scripts/requirements.txt # worker-specific deps

      - name: Run ETL
        run: python scripts/etl_worker.py
