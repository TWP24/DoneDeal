name: DoneDeal ETL

# Runs the scraper, then the scorer, every 2 hours.
# Also runnable manually from the GitHub Actions UI for testing.
# (Standard cron doesn't support 90-minute intervals cleanly.
#  Change to "0,30 * * * *" if you want every 30 minutes.)
on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

concurrency:
  # Prevent overlapping runs if a previous one is still going
  group: donedeal-etl
  cancel-in-progress: false

jobs:
  etl:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      # Optional: restrict to specific makes. Comma separated.
      SCRAPE_MAKES: ${{ vars.SCRAPE_MAKES }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .                        # installs the `donedeal` package
          pip install -r scripts/requirements.txt # worker-specific deps

      - name: Scrape
        run: python scripts/scrape_worker.py

      - name: Score + fan out alerts
        run: python scripts/score_worker.py
